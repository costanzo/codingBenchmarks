id: task_001
category: 03_frontend_ui
title: "Organization Invitation Management UI"
version: 2
difficulty: hard
language: TypeScript/React frontend with Java/JDK 17 runtime
jdk: 17

source:
  type: keycloak_business_workflow
  repository: keycloak/keycloak
  domain: organizations
  feature_area: admin_console_invitations

paths:
  prompt: prompt.md
  workspace: workspace/keycloak
  result: result.md
  artifacts: artifacts
  worktree: workspace/keycloak

execution_policy:
  mode: agent_managed
  agent_may_run_code: true
  agent_may_run_tests: true
  agent_may_run_workspace_commands: true
  repository_grading_scripts: false
  repository_under_test: keycloak
  worktree_path: workspace/keycloak
  branch_pattern: bench/<MODEL_CODE>/<CATEGORY>/<TASK_ID>
  expected_jdk: 17
  frontend_task_exception: true
  allowed_frontend_stack:
    - TypeScript
    - React
    - PatternFly
    - Keycloak Admin Console frontend tests
    - Keycloak admin-client bindings

ui_task:
  business_system: Organization management
  workflow: Organization membership invitations
  expected_surface: Keycloak Admin Console
  required_capabilities:
    - list_pending_invitations
    - search_or_filter_invitations
    - create_invitation
    - revoke_invitation
    - loading_empty_success_error_states
    - i18n_and_accessibility

scoring:
  scale:
    min: 1.0
    max: 5.0
    increment: 0.5
  dimensions:
    product_fit:
      weight: 0.20
    admin_console_integration:
      weight: 0.20
    workflow_completeness:
      weight: 0.20
    state_and_error_handling:
      weight: 0.15
    code_quality_and_maintainability:
      weight: 0.15
    verification_and_report_quality:
      weight: 0.10

grading:
  mode: manual_report_review
  score_output: result.md

result_contract:
  required_sections:
    - Status
    - Summary
    - Files Changed
    - Navigation and Entry Points
    - API and Client Integration
    - UI States and Validation
    - Tests and Verification
    - Limitations
    - Token Usage

reporting:
  include_in_leaderboard: true
  public_name: "Frontend UI: Organization Invitation Management"