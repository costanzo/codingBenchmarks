id: task_001
category: 05_code_analysis
title: "Browser Authentication Flow and Required Actions Analysis"
version: 2
difficulty: hard
language: Java
jdk: 17

source:
  type: keycloak_code_analysis
  repository: keycloak/keycloak
  domain: authentication
  feature_area: browser_flow_required_actions

paths:
  prompt: prompt.md
  workspace: workspace/keycloak
  result: result.md
  artifacts: artifacts
  worktree: workspace/keycloak

execution_policy:
  mode: agent_managed
  agent_may_run_code: true
  agent_may_run_tests: true
  agent_may_run_workspace_commands: true
  repository_grading_scripts: false
  repository_under_test: keycloak
  worktree_path: workspace/keycloak
  branch_pattern: bench/<MODEL_CODE>/<CATEGORY>/<TASK_ID>
  expected_jdk: 17
  source_changes_expected: false

analysis_task:
  mode: architecture_and_flow_analysis
  primary_topics:
    - browser_authentication_flow
    - required_actions
    - authentication_session_lifecycle
    - user_session_creation
    - authenticator_extension_points
    - required_action_extension_points
  required_artifacts:
    - sequence_diagram
    - state_machine
    - key_class_map
    - source_referenced_execution_path
    - edge_case_analysis
    - security_checkpoint_analysis

scoring:
  scale:
    min: 1.0
    max: 5.0
    increment: 0.5
  dimensions:
    code_path_accuracy:
      weight: 0.30
    state_machine_quality:
      weight: 0.20
    sequence_diagram_quality:
      weight: 0.15
    required_action_understanding:
      weight: 0.15
    security_and_edge_cases:
      weight: 0.10
    source_reference_quality:
      weight: 0.10

grading:
  mode: manual_report_review
  score_output: result.md

result_contract:
  required_sections:
    - Status
    - Executive Summary
    - Key Class and Interface Map
    - Browser Authentication Sequence Diagram
    - Required Action State Machine
    - Execution Path
    - Extension Points
    - Session Model Relationships
    - Security Checkpoints
    - Edge Cases
    - Files Inspected
    - Commands Run
    - Limitations
    - Token Usage And Cost Inputs

reporting:
  include_in_leaderboard: true
  public_name: "Code Analysis: Browser Authentication Flow and Required Actions"