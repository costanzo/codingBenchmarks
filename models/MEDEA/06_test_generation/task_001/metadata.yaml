id: task_001
category: 06_test_generation
title: "Password Policy Test Coverage"
version: 2
difficulty: hard
language: Java
jdk: 17

source:
  type: keycloak_test_generation
  repository: keycloak/keycloak
  domain: authentication
  feature_area: password_policy

paths:
  prompt: prompt.md
  workspace: workspace/keycloak
  result: result.md
  artifacts: artifacts
  worktree: workspace/keycloak

execution_policy:
  mode: agent_managed
  agent_may_run_code: true
  agent_may_run_tests: true
  agent_may_run_workspace_commands: true
  repository_grading_scripts: false
  repository_under_test: keycloak
  worktree_path: workspace/keycloak
  branch_pattern: bench/<MODEL_CODE>/<CATEGORY>/<TASK_ID>
  expected_jdk: 17
  production_changes_expected: false

test_generation_task:
  target_area: password_policy
  required_language: Java
  coverage_scope: targeted_password_policy_classes
  minimum_line_coverage: 0.90
  minimum_branch_coverage: 0.90
  required_focus:
    - valid_policy_configurations
    - invalid_policy_configurations
    - boundary_values
    - combined_policies
    - password_history
    - user_attribute_related_policies
    - malformed_inputs
    - security_relevant_failures

scoring:
  scale:
    min: 1.0
    max: 5.0
    increment: 0.5
  dimensions:
    coverage_improvement:
      weight: 0.30
    behavioral_correctness:
      weight: 0.25
    edge_case_quality:
      weight: 0.20
    integration_with_existing_tests:
      weight: 0.15
    report_quality:
      weight: 0.10

grading:
  mode: manual_report_review
  score_output: result.md

result_contract:
  required_sections:
    - Status
    - Summary
    - Target Classes
    - Files Changed
    - Test Strategy
    - Commands Run
    - Coverage Results
    - Production Code Changes
    - Limitations
    - Token Usage

reporting:
  include_in_leaderboard: true
  public_name: "Test Generation: Password Policy Coverage"