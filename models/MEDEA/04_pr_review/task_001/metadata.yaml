id: task_001
category: 04_pr_review
title: "Review Keycloak PR #50650"
version: 1
difficulty: hard
language: Java
jdk: 17

source:
  type: github_pull_request
  url: https://github.com/keycloak/keycloak/pull/50650
  repository: keycloak/keycloak
  pull_request_number: 50650
  pr_ref: refs/pull/50650/head
  observed_head_sha: ec5bb77fc8b8700856a8d448c0f2e9ba6e5a08ef

paths:
  prompt: prompt.md
  workspace: workspace/keycloak
  result: result.md
  artifacts: artifacts
  worktree: workspace/keycloak

execution_policy:
  mode: agent_managed
  agent_may_run_code: true
  agent_may_run_tests: true
  agent_may_run_workspace_commands: true
  repository_grading_scripts: false
  repository_under_test: keycloak
  worktree_path: workspace/keycloak
  branch_pattern: bench/<MODEL_CODE>/<CATEGORY>/<TASK_ID>
  expected_jdk: 17

review:
  mode: pull_request_review
  severity_levels:
    - P0
    - P1
    - P2
    - P3
  expected_output: prioritized_findings
  compare_against: benchmark_pinned_base

scoring:
  scale:
    min: 1.0
    max: 5.0
    increment: 0.5
  dimensions:
    critical_issue_detection:
      weight: 0.35
    accuracy:
      weight: 0.25
    changed_area_coverage:
      weight: 0.15
    false_positive_control:
      weight: 0.15
    actionability:
      weight: 0.10

grading:
  mode: manual_report_review
  score_output: result.md

result_contract:
  required_sections:
    - Status
    - PR Summary
    - Review Method
    - Prioritized Findings
    - Test Gap Analysis
    - Compatibility and Regression Analysis
    - Files Inspected
    - Risk Assessment
    - Token Usage And Cost Inputs
    - Notes

reporting:
  include_in_leaderboard: true
  public_name: "PR Review: Keycloak PR #50650"
