id: task_001
category: 01_algorithm
title: "Temporal Dependency Router"
version: 1
difficulty: very_hard
language: Java
jdk: 17
repository_under_test: none
standalone: true

paths:
  prompt: prompt.md
  workspace: workspace/algorithm
  result: result.md
  artifacts: artifacts

execution_policy:
  mode: agent_managed
  agent_may_run_code: true
  agent_may_run_tests: true
  agent_may_run_workspace_commands: true
  repository_grading_scripts: false
  expected_jdk: 17

problem:
  type: standalone_algorithm
  name: Temporal Dependency Router
  primary_file: workspace/algorithm/src/main/java/TemporalDependencyRouter.java
  constraints:
    max_nodes: 100000
    max_edges: 300000
    max_queries: 100000
    max_capabilities: 12
    max_edge_windows: 600000

scoring:
  scale:
    min: 1.0
    max: 5.0
    increment: 0.5
  dimensions:
    correctness:
      weight: 0.45
    scalability:
      weight: 0.20
    code_quality:
      weight: 0.15
    edge_cases:
      weight: 0.10
    report_quality:
      weight: 0.10

grading:
  mode: manual_report_review
  score_output: result.md

result_contract:
  required_sections:
    - Status
    - Summary
    - Files Changed
    - Approach and Reasoning
    - Algorithmic Complexity
    - Rating
    - Token Usage
    - Notes

reporting:
  include_in_leaderboard: true
  public_name: "Algorithm: Temporal Dependency Router"
